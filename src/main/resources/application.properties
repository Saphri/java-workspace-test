# Streams and subjects are auto-created by default based on channel configuration
quarkus.messaging.nats.streams.test.configuration.subjects=data,test
quarkus.messaging.nats.streams.test.pull-consumers.data-consumer.consumer-configuration.filter-subjects=data

mp.messaging.outgoing.data-out.connector=quarkus-jetstream
mp.messaging.outgoing.data-out.stream=test
mp.messaging.outgoing.data-out.subject=data

mp.messaging.incoming.data-in.connector=quarkus-jetstream
mp.messaging.incoming.data-in.stream=test
mp.messaging.incoming.data-in.consumer=data-consumer

# uncomment for using a NATS server when testing health restart
# docker run -p 4222:4222 nats -js
quarkus.messaging.nats.devservices.enabled=false
quarkus.messaging.nats.connection.servers=nats://localhost:4222
quarkus.messaging.nats.connection.username=guest
quarkus.messaging.nats.connection.password=guest
quarkus.messaging.nats.connection.ssl-enabled=false

#%prod.quarkus.oidc.auth-server-url=http://localhost:8180/realms/quarkus
#quarkus.oidc.client-id=backend-service
#quarkus.oidc.credentials.secret=secret

